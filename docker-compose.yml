version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vitalsense_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  ml-service:
    build: ./ml-service
    container_name: vitalsense_ml_service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: vitalsense_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/vitalsense
      - MONGODB_URI=mongodb://mongodb:27017/vitalsense
      - JWT_SECRET=f4d1e2b5e0c5a2e5d9c8b7a6f5e4d3c2b1a09876543210abcdef0123456789ab
      - PRESAGE_API_KEY=mock_api_key_placeholder
      - CLIENT_ORIGIN=*
      - NODE_ENV=production
    depends_on:
      - mongodb
      - ml-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vitalsense_frontend
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
